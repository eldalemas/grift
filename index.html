<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Poker</title>
    
    <link rel="apple-touch-icon" href="grift_icon.png">

    <style>
        :root { --gold: #f1c40f; --green: #00ff41; --bg: #050505; --red: #ff4141; }
        
        body { 
            font-family: 'Courier New', monospace; 
            background: var(--bg); 
            color: var(--green); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
            height: 100vh;
            justify-content: center;
            overflow: hidden;
        }

        .container { 
            border: 1px solid var(--green); 
            padding: 25px; 
            width: 90%; 
            max-width: 450px; 
            background: rgba(0,0,0,0.95); 
            position: relative; 
            box-shadow: 0 0 30px rgba(0,255,65,0.15); 
            border-radius: 12px; 
        }

        #timer { 
            font-size: 3.2rem; 
            color: var(--gold); 
            cursor: help; 
            margin-bottom: 10px; 
            text-align: center;
            text-shadow: 0 0 15px rgba(241,196,15,0.4); 
            user-select: none;
            -webkit-user-select: none;
        }

        #question-area { 
            min-height: 100px; 
            font-size: 1.15rem; 
            border-left: 4px solid var(--green); 
            padding-left: 15px; 
            margin-bottom: 30px; 
            color: white; 
            display: flex; 
            align-items: center; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group { display: flex; gap: 15px; }

        button { 
            flex: 1; 
            background: transparent; 
            border: 1px solid var(--green); 
            color: var(--green); 
            padding: 22px 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: 'Courier New', monospace;
            font-size: 0.9rem; 
            transition: 0.2s; 
            border-radius: 4px; 
            text-transform: uppercase;
        }

        button:active { background: var(--green); color: black; transform: scale(0.95); }

        #cheat-overlay { 
            position: absolute; 
            top: 10px; 
            right: 15px; 
            font-size: 0.7rem; 
            color: var(--gold); 
            opacity: 0; 
            transition: 0.2s; 
            pointer-events: none; 
        }

        .hidden { display: none; }

        #final-card { font-size: 4rem; color: var(--gold); margin: 10px 0; letter-spacing: 4px; }
        
        .cold-read { 
            font-style: italic; 
            color: #888; 
            margin-top: 15px; 
            font-size: 0.9rem; 
            border-top: 1px solid #333; 
            padding-top: 15px; 
            line-height: 1.4;
        }

        .rank-tag { font-size: 0.7rem; color: #444; margin-top: 25px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="cheat-overlay">HUD: [PEEK ACTIVE]</div>
    <div id="timer" onmousedown="showPeek()" onmouseup="hidePeek()" ontouchstart="showPeek()" ontouchend="hidePeek()">0.00s</div>
    
    <div id="game-screen">
        <div id="question-area">NEURAL SCAN READY...<br>SELECT STARTING SIDE.</div>
        <div class="btn-group">
            <button onclick="process(false)" id="btn-n">SIDE A (ANTE)</button>
            <button onclick="process(true)" id="btn-y">SIDE B (SHOWDOWN)</button>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 id="final-card">---</h2>
        <p id="final-hand" style="color:white; font-size: 1.1rem; margin: 0;">---</p>
        <div id="final-reading" class="cold-read">---</div>
        
        <div style="border-top: 1px solid #222; margin-top: 20px; padding-top: 15px; font-size: 0.8rem;">
            TIME: <span id="final-time" style="color:var(--gold)">0</span>s | 
            RANK: <span id="rank" style="color:var(--gold)">---</span>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; width:100%; border-color: var(--gold); color: var(--gold);">RESET SCAN</button>
    </div>
</div>

<div class="rank-tag">GM: &lt; 8s | SHARK: &lt; 12s | RECRUIT: 12s+</div>

<script>
    const cardData = {
        0:  ["7s", "High Card", "You chose the most invisible card. Subtle and observant."],
        1:  ["As", "One Pair", "The Ace of Spades. You appreciate the classic power."],
        2:  ["8d", "Two Pair", "Sharp, diamond-cut logic. You're a natural strategist."],
        3:  ["10s", "3 of Kind", "Grounded but heavy-hitting. You value stability."],
        4:  ["Jh", "Straight", "Emotional and structured. A romantic at heart."],
        5:  ["Qs", "Flush", "Fluid and elegant. You move with the current."],
        6:  ["Jc", "Full House", "Complex and layered. You see the whole board."],
        7:  ["Ks", "Royal Flush", "Top-tier ambition. You play to win everything."],
        8:  ["9h", "High Card (Alt)", "Understated. You like staying a step ahead."],
        9:  ["8c", "One Pair (Alt)", "Practical and hardy. You focus on the work."],
        10: ["Ah", "Two Pair (Alt)", "Prestigious and warm. You have high standards."],
        11: ["8h", "3 of Kind (Alt)", "Balanced and rhythmic. You find the pattern."],
        12: ["6c", "Straight (Alt)", "Calculated. You enjoy the process."],
        13: ["7c", "Flush (Alt)", "Deep and mysterious. You keep your cards close."],
        14: ["4s", "Full House (Alt)", "Strong foundations. You build to last."],
        15: ["Qh", "Straight Flush", "Lethal elegance. You play the highest stakes."],
        16: ["Ac", "High Card", "Cold and clinical. A true professional choice."],
        17: ["7d", "One Pair", "Intricate and precise. You enjoy the details."],
        18: ["5h", "Two Pair", "A heartbeat card. You follow your intuition."],
        19: ["5d", "3 of Kind", "Resilient. You don't fold under pressure."],
        20: ["3s", "Straight", "Minimalist but effective. You find the gap."],
        21: ["9d", "Flush", "Sharp and expansive. You see the big picture."],
        22: ["2c", "Full House", "Deceptively strong. You like being the underdog."],
        23: ["Jd", "4 of Kind", "Rare and sharp. You have a unique perspective."],
        24: ["3d", "Straight Flush", "Geometric and rare. You're one in a million."],
        25: ["Kd", "Royal Flush", "Crystalline power. You seek the ultimate reward."],
        26: ["3c", "High (Elite)", "A specialized choice. You think differently."],
        27: ["Js", "Pair (Elite)", "Guarded and sharp. You protect your assets."],
        28: ["2d", "Two Pair (Elite)", "Duality. You see both sides of the coin."],
        29: ["Ad", "3 of Kind (Elite)", "The diamond edge. You are pure focus."],
        30: ["2s", "4 of Kind (Elite)", "Absolute control. You dictate the pace."],
        31: ["10h", "Royal Flush (Elite)", "The heart of the game. A true high-roller."]
    };

    const steps = [
        { v: 16, q: "VISUAL: Front (A) or Back (B)?", n: "SIDE A", y: "SIDE B" },
        { v: 8,  q: "TEMP: Is the card RED?", n: "BLACK", y: "RED" },
        { v: 4,  q: "SHAPE: Pointed (Spade/Diamond)?", n: "ROUNDED", y: "POINTED" },
        { v: 2,  q: "WEIGHT: High Card (10-Ace)?", n: "LOW", y: "HIGH" },
        { v: 1,  q: "EGO: Face Card (J, Q, K)?", n: "NUMBER", y: "FACE" }
    ];

    let currentStep = 0, total = 0, startTime, timerInterval;

    function showPeek() { 
        if(startTime) {
            let peek = cardData[total] ? cardData[total][0] : "SUM:"+total;
            document.getElementById('cheat-overlay').innerText = "PEEK: " + peek.toUpperCase();
            document.getElementById('cheat-overlay').style.opacity = 1; 
        }
    }
    function hidePeek() { document.getElementById('cheat-overlay').style.opacity = 0; }

    function process(isYes) {
        if (currentStep === 0) {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2) + "s";
            }, 50);
        }

        if (isYes) total += steps[currentStep].v;
        currentStep++;

        if (currentStep < steps.length) {
            const next = steps[currentStep];
            document.getElementById('question-area').innerText = next.q;
            document.getElementById('btn-n').innerText = next.n;
            document.getElementById('btn-y').innerText = next.y;
        } else {
            finish();
        }
    }

    function finish() {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const data = cardData[total] || ["??", "ERROR", "Scan failed."];
        document.getElementById('final-card').innerText = data[0].toUpperCase();
        document.getElementById('final-hand').innerText = "LOCATION: " + data[1].toUpperCase();
        document.getElementById('final-reading').innerText = `"${data[2]}"`;
        
        let elapsed = (Date.now() - startTime) / 1000;
        document.getElementById('final-time').innerText = elapsed.toFixed(2);
        
        let rank = "RECRUIT";
        if (elapsed < 8) rank = "GRANDMASTER";
        else if (elapsed < 12) rank = "SHARK";
        document.getElementById('rank').innerText = rank;
    }
</script>
</body>
</html>
